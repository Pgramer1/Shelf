spring:
  application:
    name: shelf-backend

  # ── Google OAuth2 (optional) ───────────────────────────────────────────────
  # Supply credentials via ONE of the methods below, then restart the app.
  #
  # Option A – environment variables (recommended for production / Docker):
  #   GOOGLE_CLIENT_ID=your_client_id.apps.googleusercontent.com
  #   GOOGLE_CLIENT_SECRET=your_client_secret
  #
  # Option B – application.yml properties (convenient for local development):
  #   Uncomment the block below and fill in your values from
  #   https://console.cloud.google.com/ → APIs & Services → Credentials
  #
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         google:
  #           client-id: your_client_id.apps.googleusercontent.com
  #           client-secret: your_client_secret
  # ──────────────────────────────────────────────────────────────────────────

  datasource:
    # Priority: explicit full URL → individual parts → local default
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:shelf_db}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:admin}}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        sslmode: ${DB_SSLMODE:disable}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

jwt:
  secret-key: ${JWT_SECRET:c2hlbGYtand0LXNlY3JldC1rZXktZm9yLXByb2R1Y3Rpb24tY2hhbmdlLXRoaXMtaW4tcHJvZHVjdGlvbi1taW5pbXVtLTI1Ni1iaXRzLWxvbmctZW5vdWdo}
  expiration: 86400000 # 24 hours in milliseconds

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  forward-headers-strategy: native

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth/callback}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.shelf: INFO
    org.springframework.security: WARN
    org.springframework.security.oauth2: DEBUG

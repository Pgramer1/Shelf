# H2 Database Configuration (No PostgreSQL needed)
# Uncomment these lines to use H2 instead of PostgreSQL

spring:
  application:
    name: shelf-backend

  datasource:
    url: jdbc:h2:file:./data/shelf;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  security:
    jwt:
      # kept for reference only — actual binding is via top-level jwt: key
      secret-key: unused

jwt:
  secret-key: your-secret-key-change-this-in-production-minimum-256-bits
  expiration: 86400000 # 24 hours in milliseconds

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.shelf: DEBUG
    org.springframework.security: DEBUG
